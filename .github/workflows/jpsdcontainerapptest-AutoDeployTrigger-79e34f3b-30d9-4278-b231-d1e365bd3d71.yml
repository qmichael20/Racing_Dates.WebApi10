name: Trigger auto deployment for jpsdcontainerapptest

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/jpsdcontainerapptest-AutoDeployTrigger-79e34f3b-30d9-4278-b231-d1e365bd3d71.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.JPSDCONTAINERAPPTEST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.JPSDCONTAINERAPPTEST_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.JPSDCONTAINERAPPTEST_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.JPSDCONTAINERAPPTEST_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.JPSDCONTAINERAPPTEST_REGISTRY_PASSWORD }}
          containerAppName: jpsdcontainerapptest
          resourceGroup: DefaultResourceGroup-CUS
          imageToBuild: ghcr.io/jpsdcontainerapptest:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


